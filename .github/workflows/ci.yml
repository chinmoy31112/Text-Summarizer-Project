name: CI – Text Summarizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ app.py main.py setup.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 src/ app.py main.py setup.py --count --exit-zero --max-line-length=120 --statistics

      - name: Validate package imports
        run: |
          python -c "from textSummarizer.constants import CONFIG_FILE_PATH, PARAMS_FILE_PATH; print('Constants OK')"
          python -c "from textSummarizer.entity import DataIngestionConfig, ModelTrainerConfig; print('Entity OK')"
          python -c "from textSummarizer.utils.common import read_yaml, create_directories; print('Utils OK')"
          python -c "from textSummarizer.logging import logger; print('Logging OK')"
