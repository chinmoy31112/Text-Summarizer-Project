<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer — PEGASUS NLP</title>
    <meta name="description" content="Summarize long text and dialogues instantly using a fine-tuned Google PEGASUS model.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --border-color: rgba(99, 102, 241, 0.2);
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --gradient-2: linear-gradient(135deg, #0a0e1a 0%, #1e1b4b 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-2);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        body::before {
            width: 600px; height: 600px;
            background: #6366f1;
            top: -200px; right: -200px;
        }
        body::after {
            width: 500px; height: 500px;
            background: #a855f7;
            bottom: -200px; left: -200px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -50px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: rgba(99, 102, 241, 0.4);
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Textarea */
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        /* Button */
        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.6);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .btn-submit svg {
            width: 18px;
            height: 18px;
        }

        /* Summary output */
        .summary-output {
            padding: 20px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* Error output */
        .error-output {
            padding: 20px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            color: var(--error);
            font-size: 0.9rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(99, 102, 241, 0.1);
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .footer a {
            color: var(--accent-secondary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.8rem; }
            .card { padding: 24px; }
            .container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <span class="badge">Powered by Google PEGASUS</span>
            <h1>Text Summarizer</h1>
            <p>Paste any text or dialogue below and get an AI-generated summary in seconds.</p>
        </header>

        <!-- Input Card -->
        <div class="card">
            <div class="card-title">Input Text</div>
            <form action="/predict" method="post" id="summarize-form">
                <textarea
                    name="text"
                    id="input-text"
                    placeholder="Paste your text here... (e.g., a long article, a conversation, meeting notes)"
                >{{ original_text if original_text else '' }}</textarea>
                <button type="submit" class="btn-submit" id="submit-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456Z" />
                    </svg>
                    Summarize
                </button>
            </form>
        </div>

        {% if summary %}
        <!-- Summary Card -->
        <div class="card">
            <div class="card-title">Generated Summary</div>
            <div class="summary-output" id="summary-output">
                {{ summary }}
            </div>
        </div>
        {% endif %}

        {% if error %}
        <!-- Error Card -->
        <div class="card">
            <div class="card-title">Error</div>
            <div class="error-output" id="error-output">
                {{ error }}
            </div>
        </div>
        {% endif %}

        <footer class="footer">
            <p>Built with <a href="https://fastapi.tiangolo.com" target="_blank">FastAPI</a> &middot; Model: <a href="https://huggingface.co/google/pegasus-cnn_dailymail" target="_blank">google/pegasus-cnn_dailymail</a></p>
        </footer>
    </div>
</body>
</html>
